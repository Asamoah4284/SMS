# Next.js on Netlify (OpenNext adapter).
# Monorepo: Site settings → Base directory = `frontend`.
# Publish must NOT equal the base directory. Use `.next` (Next build output), not `frontend`.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
